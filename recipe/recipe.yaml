schema_version: 1

context:
  version: "3.0.0"

package:
  name: indexclient
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/indexclient/indexclient-${{ version }}.tar.gz
  sha256: 63b46c8efc6332d9cf7a64826e522657831965d3a87e4345850e29c256b491ec

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python =${{ python_min }}
    - setuptools
  run:
    - python >=${{ python_min }}
    - requests

tests:
  - python:
      imports:
        - indexclient
  - requirements:
      run:
        - pip
        - python =${{ python_min }}
    script:
      - pip check

about:
  summary: Prototype index service client.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/uc-cdis/indexclient

extra:
  recipe-maintainers:
    - danielnachun
