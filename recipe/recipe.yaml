schema_version: 1

context:
  python_min: "3.13"
  version: "6.3.0"

package:
  name: indexclient
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/indexclient/indexclient-${{ version }}.tar.gz
  sha256: 72bc79049d8c596eafcf5e9a94d44dd9116ba56c09f36b71eda5b418d0761199

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python =${{ python_min }}
    - setuptools
    - poetry-core
  run:
    - python >=${{ python_min }}
    - requests

tests:
  - python:
      imports:
        - indexclient
  - requirements:
      run:
        - pip
        - python =${{ python_min }}
    script:
      - pip check

about:
  summary: Prototype index service client.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/uc-cdis/indexclient

extra:
  recipe-maintainers:
    - danielnachun
